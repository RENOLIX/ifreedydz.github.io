<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Atelier premium de reparation Apple: iPhone, Mac, iPad, Apple Watch et recuperation de donnees."
    />
    <title>iFreedy</title>
    <script>
      (function () {
        var base = document.createElement("base");
        base.href = window.location.hostname.endsWith("github.io")
          ? "/ifreedydz.github.io/"
          : "/";
        document.head.appendChild(base);
      })();
    </script>
    <link rel="icon" type="image/png" sizes="512x512" href="favicon.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="robots" content="index,follow" />
    <script>
      (function (l) {
        if (l.search[1] === "/") {
          const basePath = l.pathname.endsWith("/")
            ? l.pathname.slice(0, -1)
            : l.pathname;
          const decoded = l.search
            .slice(1)
            .split("&")
            .map(function (segment) {
              return segment.replace(/~and~/g, "&");
            })
            .join("?");

          window.history.replaceState(
            null,
            "",
            basePath + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
