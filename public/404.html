<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>iFreedy</title>
    <script>
      const pathSegmentsToKeep = 1;
      const { location } = window;
      const redirectUrl =
        location.protocol +
        "//" +
        location.hostname +
        (location.port ? ":" + location.port : "") +
        location.pathname
          .split("/")
          .slice(0, 1 + pathSegmentsToKeep)
          .join("/") +
        "/?/" +
        location.pathname
          .slice(1)
          .split("/")
          .slice(pathSegmentsToKeep)
          .join("/")
          .replace(/&/g, "~and~") +
        (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
        location.hash;

      location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
